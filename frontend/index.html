<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="CarbonFlow — a marketplace pairing CO₂ producers with industrial consumers using vector-based matching." />
    <meta name="theme-color" content="#100f0c" />
    <meta name="author" content="CarbonFlow" />

    <!-- Resolve the theme before paint so there's no flash. Dark by default;
         light is an explicit, persisted opt-in. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('carbonflow-theme');
          var theme = stored === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#100f0c' : '#f4f3ee');
        } catch (e) {}
      })();
    </script>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="CarbonFlow" />
    <meta property="og:description" content="A marketplace for industrial CO₂, matched by capacity, purity, and proximity." />
    <meta property="og:site_name" content="CarbonFlow" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CarbonFlow" />
    <meta name="twitter:description" content="A marketplace for industrial CO₂, matched by capacity, purity, and proximity." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <title>CarbonFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
